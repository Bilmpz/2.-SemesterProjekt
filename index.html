<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Login-site/index.css">
</head>
<body>
    <div class="main-login-boks">
        <div class="logo-box">
            <img src="../Logo/aau.jpg" alt="AAU logo">
        </div>

        <div class="login-form">
            <h2>User Login</h2>

            <input id="email" type="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">

            <button id="login-btn">Login</button>
            <button id="signup-btn">Opret bruger</button>

            <p id="forgot-password">Forgot password?</p>
            <p id="status"></p>
        </div>
    </div>

    <script type="module" src="Login-site/index.js"></script>
</body>
</html>
